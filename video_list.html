<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Picks - カテゴリ一覧</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #fafafa;
    --main-color: #ED1A3D;
    --text-color: #333333;
    --white: #ffffff;
    --shadow: 0 2px 10px rgba(0, 0, 0, 0.08);
}

body {
    font-family: 'Noto Sans JP', sans-serif;
    background-color: var(--bg-color);
    margin: 0;
    color: var(--text-color);
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 5%;
    background: var(--white);
    border-bottom: 1px solid #eee;
}

.logo {
    font-weight: 700;
    color: var(--main-color);
    font-size: 1rem;
    letter-spacing: 0.02em;
}

.back-btn {
    background: var(--main-color);
    color: white;
    padding: 6px 14px;
    border-radius: 4px;
    text-decoration: none;
    font-size: 0.85rem;
}

section {
    padding: 60px 10%;
    max-width: 1000px;
    margin: auto;
}

.section-title {
    text-align: center;
    color: var(--text-color);
    font-weight: 500;
    font-size: 1.4rem;
    margin-bottom: 40px;
}

.category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.category-card {
    background: white;
    border-radius: 4px;
    padding: 28px 20px;
    text-align: center;
    box-shadow: var(--shadow);
    transition: 0.3s;
    text-decoration: none;
    color: var(--text-color);
    display: block;
}

.category-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
}

.category-icon {
    font-size: 2rem;
    margin-bottom: 10px;
}

.category-card h3 {
    color: var(--text-color);
    margin: 0;
    font-size: 1rem;
    font-weight: 500;
}
</style>
</head>

<body>

<header>
    <div class="logo">miyun.jp</div>
    <a href="index.html" class="back-btn">← Back</a>
</header>

<section>
    <h2 class="section-title">🎥 Video Picks</h2>

    <div class="category-grid">

        <a href="videos_1.html" class="category-card">
            <div class="category-icon">🎤</div>
            <h3>歌</h3>
        </a>

        <a href="videos_2.html" class="category-card">
            <div class="category-icon">🀄</div>
            <h3>麻雀</h3>
        </a>

        <a href="videos_3.html" class="category-card">
            <div class="category-icon">🎮</div>
            <h3>ゲーム実況</h3>
        </a>

        <a href="videos_4.html" class="category-card">
            <div class="category-icon">👻</div>
            <h3>ホラーゲーム</h3>
        </a>

        <a href="videos_5.html" class="category-card">
            <div class="category-icon">📺</div>
            <h3>MonstersZ MATE 出演回</h3>
        </a>

        <a href="videos_6.html" class="category-card">
            <div class="category-icon">📚</div>
            <h3>教えて天開先生</h3>
        </a>

        <a href="videos_7.html" class="category-card">
            <div class="category-icon">🎬</div>
            <h3>理外の実写</h3>
        </a>

    </div>
</section>

</body>
</html>
