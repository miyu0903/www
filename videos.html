<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Picks</title>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #f9f4f4;
    --main-pink: #d8a7b1;
    --accent-pink: #ef8d9c;
    --text-color: #5d5050;
    --white: #ffffff;
    --shadow: 0 4px 15px rgba(216, 167, 177, 0.2);
}

body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    background-color: var(--bg-color);
    margin: 0;
    color: var(--text-color);
}

/* ヘッダー */
header {
    display: flex;
    justify-content: space-between;
    padding: 20px 5%;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
}

.logo {
    font-weight: bold;
    color: var(--main-pink);
}

/* 戻るボタン */
.back-btn {
    background: var(--main-pink);
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    text-decoration: none;
}

/* セクション */
section {
    padding: 60px 10%;
    max-width: 1000px;
    margin: auto;
}

.section-title {
    text-align: center;
    color: var(--main-pink);
    margin-bottom: 40px;
}

/* 動画カード */
.video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 25px;
}

.video-card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: 0.3s;
}

.video-card:hover {
    transform: translateY(-5px);
}

.video-wrapper {
    position: relative;
    padding-top: 56.25%;
}

.video-wrapper iframe {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
}

.video-content {
    padding: 20px;
}

.video-content h3 {
    color: var(--main-pink);
}

.comment {
    background: #fff0f3;
    padding: 10px;
    border-radius: 12px;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>
    <div class="logo">miyun.jp</div>
    <a href="index.html" class="back-btn">← Back</a>
</header>

<section>
    <h2 class="section-title">🎥 Recommended Videos</h2>

    <div class="video-grid">

        <!-- 1つ目 -->
        <div class="video-card">
            <div class="video-wrapper">
                <iframe 
                    src="https://www.youtube.com/embed/HrQPJSfGERY"
                    frameborder="0"
                    allowfullscreen>
                </iframe>
            </div>
            <div class="video-content">
                <h3>動画タイトル①</h3>
                <p class="comment">💬 作業用に最高すぎる…！</p>
            </div>
        </div>

        <!-- 2つ目 -->
        <div class="video-card">
            <div class="video-wrapper">
                <iframe 
                    src="https://www.youtube.com/embed/4zBUAK6bFuM"
                    frameborder="0"
                    allowfullscreen>
                </iframe>
            </div>
            <div class="video-content">
                <h3>動画タイトル②</h3>
                <p class="comment">💬 学習効率爆上がりするやつ📈</p>
            </div>
        </div>

    </div>
</section>

</body>
</html>
