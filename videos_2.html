<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🀄 麻雀 - Video Picks</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #fafafa;
    --main-color: #ED1A3D;
    --text-color: #333333;
    --white: #ffffff;
    --shadow: 0 2px 10px rgba(0, 0, 0, 0.08);
}

body {
    font-family: 'Noto Sans JP', sans-serif;
    background-color: var(--bg-color);
    margin: 0;
    color: var(--text-color);
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 5%;
    background: var(--white);
    border-bottom: 1px solid #eee;
}

.logo {
    font-weight: 700;
    color: var(--main-color);
    font-size: 1rem;
    letter-spacing: 0.02em;
}

.back-btn {
    background: var(--main-color);
    color: white;
    padding: 6px 14px;
    border-radius: 4px;
    text-decoration: none;
    font-size: 0.85rem;
}

section {
    padding: 60px 10%;
    max-width: 1000px;
    margin: auto;
}

.section-title {
    text-align: center;
    color: var(--text-color);
    font-weight: 500;
    font-size: 1.4rem;
    margin-bottom: 40px;
}

.video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 25px;
}

.video-card {
    background: white;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: 0.3s;
}

.video-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
}

.video-wrapper {
    position: relative;
    padding-top: 56.25%;
}

.video-wrapper iframe {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
}

.video-content {
    padding: 20px;
}

.video-content h3 {
    color: var(--text-color);
    font-weight: 500;
}

.comment {
    background: #f5f5f5;
    padding: 10px;
    border-radius: 4px;
    margin-top: 10px;
    font-size: 0.9rem;
}

.empty-message {
    text-align: center;
    color: #999;
    font-size: 1rem;
    padding: 40px;
}
</style>
</head>

<body>

<header>
    <div class="logo">miyun.jp</div>
    <a href="video_list.html" class="back-btn">← Back</a>
</header>

<section>
    <h2 class="section-title">🀄 麻雀</h2>
    
    <div class="video-grid">

                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>
            <div class="video-content">

            </div>
        </div>
    </div>


    <div class="video-card">
            <div class="video-wrapper">
                <iframe 
                    src="https://youtu.be/weStgGk3oeM?si=emnzD5PAwGwAmh9B"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>
            <div class="video-content">
                <h3>漢気塾高校麻雀部 優勝への軌跡</h3>
                <p class="comment">チーム戦麻雀大会雀魂バーチャルインターハイ　語り継がれる伝説の『嶺上開花』　お前が主人公だよ！</p>
            </div>
        </div>
    </div>

    <div class="video-card">
            <div class="video-wrapper">
                <iframe 
                    src="https://www.youtube.com/live/ud94vANWAec?si=mVAXdxZTUOZKX46b"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>
            <div class="video-content">
                <h3>天開司の麻雀教室【天開塾】</h3>

            </div>
        </div>
    </div>
    </div>


</section>

</body>
</html>
