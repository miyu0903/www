<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 ゲーム実況 - Video Picks</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #fafafa;
    --main-color: #ED1A3D;
    --text-color: #333333;
    --white: #ffffff;
    --shadow: 0 2px 10px rgba(0, 0, 0, 0.08);
}

body {
    font-family: 'Noto Sans JP', sans-serif;
    background-color: var(--bg-color);
    margin: 0;
    color: var(--text-color);
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 5%;
    background: var(--white);
    border-bottom: 1px solid #eee;
}

.logo {
    font-weight: 700;
    color: var(--main-color);
    font-size: 1rem;
    letter-spacing: 0.02em;
}

.back-btn {
    background: var(--main-color);
    color: white;
    padding: 6px 14px;
    border-radius: 4px;
    text-decoration: none;
    font-size: 0.85rem;
}

section {
    padding: 60px 10%;
    max-width: 1000px;
    margin: auto;
}

.section-title {
    text-align: center;
    color: var(--text-color);
    font-weight: 500;
    font-size: 1.4rem;
    margin-bottom: 40px;
}

.video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 25px;
}

.video-card {
    background: white;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: 0.3s;
}

.video-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
}

.video-wrapper {
    position: relative;
    padding-top: 56.25%;
}

.video-wrapper iframe {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
}

.video-content {
    padding: 20px;
}

.video-content h3 {
    color: var(--text-color);
    font-weight: 500;
}

.comment {
    background: #f5f5f5;
    padding: 10px;
    border-radius: 4px;
    margin-top: 10px;
    font-size: 0.9rem;
}

.empty-message {
    text-align: center;
    color: #999;
    font-size: 1rem;
    padding: 40px;
}
</style>
</head>

<body>

<header>
    <div class="logo">天開司 おすすめ動画 入門編</div>
    <a href="video_list.html" class="back-btn">← Back</a>
</header>

<section>
    <h2 class="section-title">🎮 ゲーム実況</h2>

    <div class="video-grid">

        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/oVXldOKjOHs"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>
            <div class="video-content">
                <h3>伝説の畳配信</h3>
                <p class="comment">ゲーム画面などを映さずに配信してしまう放送事故、通称「畳配信」の語源。必見。</p>
            </div>
        </div>

        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/WD1IODj6ME8"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>
            <div class="video-content">
                <h3>ポケモンSV 司とチンディグの物語</h3>
                <p class="comment">ポケモン大好きな天開司によるSV初見実況。深夜に襲いかかる怒涛の面白。</p>
            </div>
        </div>

        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/CTjsbPDrbTU"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>
            <div class="video-content">
                <h3>キレる天開司シリーズ（ブルアカ）</h3>
                <p class="comment">センシティブな服装に全力ツッコミする先生。</p>
            </div>
        </div>

        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/Dx0Bj4xF2No"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>
            <div class="video-content">
                <h3>キレる天開司シリーズ（ポケモン）</h3>
                <p class="comment">ギャルに限界化する名シーン。</p>
            </div>
        </div>

    </div>
</section>

</body>
</html>
